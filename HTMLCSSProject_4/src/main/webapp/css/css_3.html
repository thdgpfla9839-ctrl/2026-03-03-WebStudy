<!--  가시속성 중 display  -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
 img {
	display: block;
	width: 150px;
	height: 200px;
	margin-top: 10px;	
}
/* 인라인블록은 메뉴 만들 때 많이 사용한다*/
/* 메뉴 (li크기 지정) */
div {
	width: 100px;
	height: 100px;
	background-color: yellow;
	display: inline-block; /* 너비랑 높이가 있으면 그냥 inline을 주면 화면에 안 나온다 그렇기 때문에 inline-block으로 준다 */
	margin-left: 10px;
}
</style>
</head>
<body>
  <img src="../images/m1.jpg"> 
  <img src="../images/m2.jpg">
  <img src="../images/m3.jpg">
  <img src="../images/m4.jpg">
  <img src="../images/m5.jpg">
  <div></div>
  <div></div>
  <div></div>
</body>
</html>
