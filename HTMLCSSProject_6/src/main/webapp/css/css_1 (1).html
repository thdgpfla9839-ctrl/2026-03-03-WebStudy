<!-- 
      속성 
       = 글자 속성 
         color : 글자 색상 
         font-size : 글자 크기 
         font-weight : 두께 (normal , bold , 100~900)
         font-family: 글꼴 => google font 
         ----------------------------------
         text-align : 정렬 => left / center / right
         text-decoration : underline / none => <a>
         line-height: 줄간격(자간)
         white-space : 자동 줄바꿈 
         text-shadow : 그림자 효과 
         font : 단축속성 
       = 박스 속성 
       = 이미지 속성 
       = 위치 속성 
       = 유동 속성 
       = 가시성 => display:grid , display:flex 
                 ---------------------------- 배열 
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
body {
  margin: 20px;
}
h2 {
  margin-top: 40px;
  border-bottom: 2px solid #333;
  padding-bottom: 5px;
}
.exam{
  margin: 10px 0px;
  padding: 5px;
  border-left: 4px solid #888;
}
</style>
</head>
<body>
    <h1>글자 속성</h1>
    <h2>1. color : 글자 색상</h2>
    <!-- 
       red => #FF0000 , green => #00FF00 , blue => #0000FF
     -->
    <p class="exam" style="color:red">빨간 글자=>color:red</p>
    <p class="exam" style="color:#0000FF">파랑 글자=>color:#0000FF</p>
    <p class="exam" style="color:rgb(0,255,0)">초록 글자=>color:rgb(0,255,0)</p>
</body>
</html>
