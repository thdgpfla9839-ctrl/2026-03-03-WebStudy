<!--
HTML의 모든 태그는 id, class, style, name을 가지고 있다
p.129 ~ 160 총정리

 1. 선택자 : 태그에 css 적용(태그에 우선순위를 적용해 디자인 하는 것)  
 2. 선택자 중 기본 선택자 :
    1) * : 전체 선택자 -> 글꼴 / margin / padding에 적용
           형식)
               * {
                    속성 : 값;
                 }
                 
    2) id : 중복없는 태그 제어 -> #
            형식)
                <a href="" id="aaa"> -> 아이디 설정, 의미부여 => 작성할 때는 #aaa, a#aaa
                -> 중복이 있는 경우 자바스크립트에서 오류가 발생
                
    3) class : 중복이 있는 태그 제어(여러개 동시에 적용) -> .
    4) 태그 : 태그마다 공통으로 적용
    
    => 순서
          인라인 스타일
              |
              ID
              |
             class
              |
             태그
             
    => 특별한 경우가 아니라면 구분자로는 class를 주로 사용한다
       -------
         -> 이미지 출력, 목록 출력할 때는 for문 사용이 불가? 여기는 다시 공부하기
------------------------------------------------------------------------------      
p.135 

1. 속성 선택자 : 태그에 구분자가 없다
              input / img / a태그들은 아이디나 클래스를 갖고 있지 않는다
              그래서 밑에 형식처럼 쓴다
              
               태그[속성=값] : 값이 같은 경우
                            input -> type
                            img -> src
                            a -> href
               태그[속성*=값] : 포함
               태그[속성^=값] : 시작이 같은 경우
               태그[속성$=값] : 끝이 같은 경우
               
               
               1) input : name, size, type 
               2) a     : href, target
               3) img   : src, width, height
               4) table : <style>에서 제외
------------------------------------------------------------------------------------
p. 136

1. 후손 자손 동위태그 => 들여쓰기 구분 잘해야함

    1) 후손 : 태그 태그 태그
    2) 자손 : 태그 > 태그 > 태그
    3) 동위 : 태그 + 태그 혹은 태그 ~ 태그

--------------------------------------------------------------------------------

1. 반응 / 상태

    1) :hover
    2) :checked

1. 구조
      1) :first-child
      2) :last-child                      
      3) :nth-child(수열)

p.148 ~ 154

1. 단위
      1) 크기 단위(글자크기) : 
                          font-size -> 16px
                               %    -> 100%(16px), 50%(8)px, 150%(24)px
                              em    -> 배수단위
                                       0.2em -> 16*0.2
                                       2em   -> 2*16
                              px    -> 기본 디폴트
     2) 색상 :
             color : 시스템 색상 -> red, green, .....
             color:rgb(255,255,255) -> 괄호안은 그림판 참조하면 됨
             16진법표기 -> #                                      
         
   /* 이따 코딩 추가할 떄 필기 부분 let btn 한개만 실행이 되게끔 만든거임 */            
 -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<style type="text/css">
#click{
  background: pink;
}
</style>
<script type="text/javascript">
window.onload=function(){
	// 자바스크립트 메인 ==> $(function(){})
	let btn=document.getElementById("click"); // let btn 한개만 실행이 되게끔 만든거임
	btn.addEventListener("click",function(){
		alert("클릭 완료!!")
	})
}
</script>

<style type="text/css">
li {
	list-style: none;
	float: left;
	padding: 15px;
}

li:first-child {
	border-radius: 20px 0px 0px 20px;
}             /*    top right bottom left                     */

li:last-child {
	border-radius: 0px 20px 20px 0px;
}

li:nth-child(2n) {
	background: aqua;;
}

li:nth-child() {
  background: fuchsia;	
}
</style>
</head>
<body>
  <button id="click">클릭1</button>
  <button id="click">클릭2</button>
  <button id="click">클릭3</button>
  <button id="click">클릭4</button>
  <button id="click">클릭5</button>
  <hr>
  <ul>
      <li>홈</li>
      <li>회원가입</li>
      <li>맛집</li>
      <li>레시피</li>
      <li>여행</li>
      <li>커뮤니티</li>
      <li>마이페이지</li>
  </ul>
 
</body>
</html>
