<!--        쓰는 형태
자손 선택자 : 태그 > 태그 > 태그
후손 선택자 : 태그 태그 태그
동위 선택자 : 태그 + 태그 , 태그 ~ 태그
 => 크롤링할 때 사용
 
 
 <div>
    <p></p> -> 자손 : div > p
    <h1></h1> -> 자손 : div > h1
    <span> -> 자손 : div > span
       <h1></h1> -> 후손 : div span h1
    </span>
 </div>      => DOM 트리형태로 표현
 
 
     div
      |
    -----
    p    h1
    
    -> p+h1 / p~h1으로 불러온다  
 -->


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
 /* 자손태그 */
.aaa > img { 
  border-radius: 50px;  
}
.bbb > img {
  border-radius: 50px; 
}
/*  동위 선택자 중 자손 */
div > p+h1 {
	background: rgb(252,17,137); 
	color: black;
	
}
/*  후손 선택자 */
div span h1 {
	background: #8fa8cc;
}
/*  형제 태그 ->  2개 동시 선택 */
div > p~h1 {
	background: pink;
}

/* div h1 -> h1 전체 포함
   div > h1 -> div 바로 밑에 있는 h1 포함

*/
</style>
</head>
<body>
  <div class="aaa">
    <img src="../images/m1.jpg">
  </div>
  <div class="bbb">
   <img src="../images/m2.jpg">
  </div>
  <div class="ccc">
   <img src="../images/m3.jpg">
  </div>
  <div class="aaa">
   <img src="../images/m4.jpg">
  </div>
  <div class="aaa">
   <img src="../images/m5.jpg">
  </div>
  
  <hr>
  <div>
     <p>헬로 css</p>
     <h1>형제 1</h1> 
     <h1>형제 2</h1>
     <span>
        <h1>후손 1</h1>
     </span>      
  </div>
  </hr>
  
</body>
</html>
