<!--  
p.184
       글자 속성 : 1. margin / padding
                 2. display
                 3. background
                 4. font / text 
                 
                 1) color           : 글자 색상 ** 
                 2) font-size       : 글자 크기 => px / em **
                 3) font-weight     : 두께(normal / bold / 100 ~ 900)
                 4) font-family     : 글꼴 => 시스템, 구글 폰트에서 참고 **
                 5) text-align      : 정렬(left / center / right) **
                 6) text-decoration : uderline / none => <a> **
                 7) text-transform  : 대소문자 변환
                 8) letter-spacing  : 글자 간격
                 9) word-spacing    : 단어 간격 
                 10) line-height    : 줄 간격(=자간) **
                 11) white-space    : 자동 줄바꿈 **
                 12) text-shadow    : 그림자 효과
                 13) font           : 단축 속성 **
                  
                  --------------------------------------
                  참고 : em(배수) / px / %  16,14px 
                        2em ==> 2*16 => 32
       
 -->

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
 <h1>글자 속성 정의</h1>
  <h2>1. color : 글자 색상</h2>
  <h2>2. font-size : 글자 크기 => em단위(배수) / px단위(기본 글자단위 => 16px) / %단위</h2>
  <h2>3. font-family : 글꼴</h2>
  <h2>4. font-style : 글자 형식</h2>
  <h2>5. font-weight : 글자 두께</h2>
  <h2>6. text-align : 정렬</h2>
</body>
</html>
