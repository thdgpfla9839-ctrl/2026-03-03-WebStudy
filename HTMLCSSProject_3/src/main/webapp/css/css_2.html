<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
div {
	width: 200px;
	height: 200px;
	background-color: blue;
}
/* 탑이랑 바텀이 짝 / 레프트와 라이트가 짝 */
.box1 {
  margin: 30px; /* 30 30 30 30인데 뒤에 좌표들이 생략됨-> 속기법 */
}

.box2 {
  margin: 30px 50px;
}

.box3 {
  margin: 30px 30px 30px 30px;
}

.box4 {
  margin: 30px 50px 30px 50px;
}

/* 브라우저 안에서 태그와 태그 사이의 간격(여백)을 줄 때 -> margin을 사용한다 */

</style>
</head>
<body>
  <div class="box1"></div> <!-- 태그를 모아서 관리할 때/ 세로 분할할 때 사용 -> 단점은 출력모양은 없기 떄문에 css를 이용해서 모양을 잡아야 한다 -->
  <div class="box2"></div>
  <div class="box3"></div>
  <div class="box4"></div>
  
  
</body>
</html>
